name: Frontend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-and-build:
    name: Lint & Build (Next.js)
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 - Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      # Step 3 - Install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4 - Lint
      - name: Lint
        run: npm run lint

      # Step 5 - Build
      - name: Build
        run: npm run build